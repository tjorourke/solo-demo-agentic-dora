# Multi-cluster variant — bank cluster.
# Hosts fraud-bot, triage-bot, the MCP servers, agentregistry, agentgateway,
# observability stack, and (co-located) Solo Enterprise for Istio mgmt-side
# components. This is the heaviest cluster — two workers.
# Trust domain: bank.local. Cluster name (kind context): trustusbank-bank.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: trustusbank-bank
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
  - role: worker
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
networking:
  podSubnet: "10.20.0.0/16"
  serviceSubnet: "10.120.0.0/16"
