kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: trustusbank
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    # No extraPortMappings — the whole demo uses kubectl port-forward
    # (allocated from 18000+). Avoids host-port conflicts when other kind
    # clusters or local services are running.
  - role: worker
  - role: worker
  - role: worker
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
