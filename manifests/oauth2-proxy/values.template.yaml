# oauth2-proxy template — placeholders are substituted at install time by
# scripts/07-kagent.sh:
#   __DEX_CLIENT_SECRET__ -> extracted from the dex Secret
#   __COOKIE_SECRET__     -> re-used or freshly minted via `openssl rand`
#
# oauth2-proxy sits between the user's browser and kagent-ui, validating
# tokens issued by dex. The kagent Enterprise UI's "Sign in with SSO"
# button is hardcoded to /oauth2/start — exactly the path oauth2-proxy
# intercepts. Authenticated traffic is then proxied transparently to
# kagent-ui (which still routes /api/* through to the controller).

replicaCount: 1

image:
  pullPolicy: IfNotPresent

extraArgs:
  provider: oidc
  oidc-issuer-url: http://host.docker.internal:5556
  client-id: kagent-enterprise
  email-domain: '*'
  upstream: http://kagent-ui.trustusbank-platform.svc.cluster.local:8080
  redirect-url: http://localhost:18007/oauth2/callback
  cookie-secure: 'false'        # plain http on localhost
  cookie-samesite: lax
  pass-authorization-header: 'true'
  pass-access-token: 'true'
  set-authorization-header: 'true'
  set-xauthrequest: 'true'
  skip-provider-button: 'true'
  reverse-proxy: 'true'
  approval-prompt: auto
  http-address: 0.0.0.0:4180

config:
  clientID: kagent-enterprise
  clientSecret: __DEX_CLIENT_SECRET__
  cookieSecret: __COOKIE_SECRET__

service:
  type: ClusterIP
  portNumber: 4180

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi
