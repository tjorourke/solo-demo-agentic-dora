apiVersion: agentregistry.solo.io/v1alpha1
kind: Policy
metadata:
  name: require-signing
  namespace: trustusbank-platform
spec:
  signing:
    required: true
    trustedKeys:
      - name: trustusbank-org
        publicKey: |
          # populated by 04-registry.sh from $COSIGN_ORG_PUB
          PLACEHOLDER
  enforcement: deny   # reject unsigned/untrusted artefacts at registration
