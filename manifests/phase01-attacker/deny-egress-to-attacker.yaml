# Deny all incoming traffic to mock-attacker from the bank's namespaces.
# This is what's APPLIED by ./scripts/deploy-solo.sh and REMOVED by
# ./scripts/solo-off.sh. Without it, evil-tools' lateral exfil to
# mock-attacker succeeds (Act 1). With it, ztunnel resets the
# connection at L4 and customer data never leaves the cluster (Act 2).

apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-bank-to-attacker
  namespace: external-attacker
spec:
  action: DENY
  rules:
    - from:
        - source:
            namespaces:
              - trustusbank-bank-evil
              - trustusbank-bank-mcp
              - trustusbank-bank-agents
              - trustusbank-bank-frontend
              - trustusbank-platform
