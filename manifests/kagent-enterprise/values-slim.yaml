# Slim values for kagent-enterprise on the demo bank cluster (kind).
# Minimum footprint to get the Enterprise UI + controller working.
#
# What's enabled:  controller, ui, bundled postgres (shrunk)
# What's disabled: kmcp, all 14 agent subcharts, kagent-tools,
#                  grafana-mcp, querydoc, OTel sidecars.
#
# Resource ask: ~250m CPU, ~512Mi RAM, 500Mi PVC for postgres.

# License (chart accepts any non-empty 12+ char string for dev/eval -
# nothing actually validates the value yet)
global:
  licensing:
    createSecret: true
    secretName: enterprise-kagent-license
    licenseKey: "dummy-dev-key-1234567890"

# OIDC: point the controller at dex (deployed alongside kagent on the
# bank cluster). The issuer URL uses host.docker.internal so the SAME
# URL works from BOTH:
#   - in-cluster pods (kind's CoreDNS resolves to the Docker host IP)
#   - the user's browser on macOS (resolved via /etc/hosts -> 127.0.0.1,
#     which port-forward then routes back to the dex Service)
# The clientSecret value lives in the kagent-enterprise-oidc-secret
# Secret which is created out-of-band by scripts/07-kagent.sh.
oidc:
  issuer: http://host.docker.internal:5556
  clientId: kagent-enterprise
  secretRef: kagent-enterprise-oidc-secret
  secretKey: clientSecret

# RBAC: every authenticated user is mapped to Admin. dex's static
# passwords don't include a groups claim, so the chart's default CEL
# expression (which transforms claims.Groups via the rolesMap) fails
# with "no such key: Groups" for every request. For a single-user demo
# we just hardcode the Admin role.
rbac:
  roleMapping:
    roleMapper: "['global.Admin']"

# Controller (always deployed) - keep defaults, they're already lean.
controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# UI - the reason we're swapping in the first place
ui:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Bundled postgres - shrunk for kind
database:
  postgres:
    bundled:
      enabled: true
      storage: 500Mi
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi

# Disable everything that isn't strictly required
kmcp:
  enabled: false
kagent-tools:
  enabled: false
grafana-mcp:
  enabled: false
querydoc:
  enabled: false
k8s-agent:
  enabled: false
kgateway-agent:
  enabled: false
istio-agent:
  enabled: false
promql-agent:
  enabled: false
observability-agent:
  enabled: false
argo-rollouts-agent:
  enabled: false
helm-agent:
  enabled: false
cilium-policy-agent:
  enabled: false
cilium-manager-agent:
  enabled: false
cilium-debug-agent:
  enabled: false
