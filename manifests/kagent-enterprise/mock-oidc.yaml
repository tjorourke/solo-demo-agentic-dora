# Minimum mock OIDC service to satisfy kagent-enterprise's startup OIDC
# discovery. The chart hardcodes the OIDC issuer URL to
# http://solo-enterprise-ui.<ns>.svc.cluster.local:5556 when
# oidc.issuer is unset, expecting Solo's enterprise management plane to
# provide it. We don't have that plane on the demo, so we serve a static
# discovery document from nginx instead.
#
# This is enough for the controller to boot. The UI uses NextAuth which
# defaults to a local credentials flow when no real IdP is configured.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-oidc-config
  namespace: trustusbank-platform
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 5556;
        location = /.well-known/openid-configuration {
          add_header Content-Type application/json;
          return 200 '{"issuer":"http://solo-enterprise-ui.trustusbank-platform.svc.cluster.local:5556","authorization_endpoint":"http://solo-enterprise-ui.trustusbank-platform.svc.cluster.local:5556/auth","token_endpoint":"http://solo-enterprise-ui.trustusbank-platform.svc.cluster.local:5556/token","jwks_uri":"http://solo-enterprise-ui.trustusbank-platform.svc.cluster.local:5556/keys","userinfo_endpoint":"http://solo-enterprise-ui.trustusbank-platform.svc.cluster.local:5556/userinfo","response_types_supported":["code","id_token","token id_token"],"subject_types_supported":["public"],"id_token_signing_alg_values_supported":["RS256"],"scopes_supported":["openid","email","groups","profile","offline_access"],"token_endpoint_auth_methods_supported":["client_secret_basic"],"claims_supported":["aud","email","exp","iat","iss","sub","groups"]}';
        }
        location = /keys {
          add_header Content-Type application/json;
          return 200 '{"keys":[]}';
        }
        location / {
          return 200 'mock-oidc';
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: solo-enterprise-ui
  namespace: trustusbank-platform
  labels:
    app: solo-enterprise-ui
    app.kubernetes.io/component: mock-oidc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: solo-enterprise-ui
  template:
    metadata:
      labels:
        app: solo-enterprise-ui
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 5556
          volumeMounts:
            - name: cfg
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: cfg
          configMap:
            name: mock-oidc-config
---
apiVersion: v1
kind: Service
metadata:
  name: solo-enterprise-ui
  namespace: trustusbank-platform
spec:
  selector:
    app: solo-enterprise-ui
  ports:
    - port: 5556
      targetPort: 5556
      protocol: TCP
      name: oidc
