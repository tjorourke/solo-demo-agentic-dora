# RemoteMCPServer references are namespace-local. Each agent's namespace gets
# its own set; auth is via headersFrom (Bearer JWT injected from a Secret that
# Phase 6 creates from a Keycloak token-exchange Job).

apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: account-mcp
  namespace: trustusbank-bank-agents
spec:
  description: TrustUsBank account info via agentgateway (JWT-authed)
  protocol: STREAMABLE_HTTP
  url: http://trustusbank-agentgw.trustusbank-platform.svc.cluster.local:8080/mcp/account
  headersFrom:
    - name: Authorization
      valueFrom:
        secretKeyRef:
          name: support-bot-jwt
          key: bearer
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: transaction-mcp
  namespace: trustusbank-bank-agents
spec:
  description: TrustUsBank transactions via agentgateway (JWT-authed)
  protocol: STREAMABLE_HTTP
  url: http://trustusbank-agentgw.trustusbank-platform.svc.cluster.local:8080/mcp/transaction
  headersFrom:
    - name: Authorization
      valueFrom:
        secretKeyRef:
          name: support-bot-jwt
          key: bearer
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: ticket-mcp
  namespace: trustusbank-bank-agents
spec:
  description: TrustUsBank ticketing + human escalation via agentgateway
  protocol: STREAMABLE_HTTP
  url: http://trustusbank-agentgw.trustusbank-platform.svc.cluster.local:8080/mcp/ticket
  headersFrom:
    - name: Authorization
      valueFrom:
        secretKeyRef:
          name: triage-bot-jwt
          key: bearer
