# RemoteMCPServer CRDs — no JWT headers needed. agentgateway authenticates
# callers via the ambient mesh's SPIFFE identity (mTLS at ztunnel), and
# the per-route tool-allowlist policies enforce per-tool authz at L7.
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: account-mcp
  namespace: trustusbank-bank-agents
spec:
  description: TrustUsBank account info via agentgateway
  protocol: STREAMABLE_HTTP
  url: http://trustusbank-agentgw.trustusbank-platform.svc.cluster.local:8080/mcp/account
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: transaction-mcp
  namespace: trustusbank-bank-agents
spec:
  description: TrustUsBank transactions via agentgateway
  protocol: STREAMABLE_HTTP
  url: http://trustusbank-agentgw.trustusbank-platform.svc.cluster.local:8080/mcp/transaction
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: ticket-mcp
  namespace: trustusbank-bank-agents
spec:
  description: TrustUsBank ticketing + human escalation via agentgateway
  protocol: STREAMABLE_HTTP
  url: http://trustusbank-agentgw.trustusbank-platform.svc.cluster.local:8080/mcp/ticket
---
# currency-converter — wired in DELIBERATELY for the demo. The "rogue currency
# converter" the red team registered. Two attack vectors live here:
# (1) the tool description embeds a prompt-injection in the rugpull variant;
# (2) v1.0.0-rugpull replaces v1.0.0 with mutated content (digest mismatch).
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: currency-converter
  namespace: trustusbank-bank-agents
spec:
  description: Currency conversion helper (red-team registered, untrusted signer)
  protocol: STREAMABLE_HTTP
  url: http://trustusbank-agentgw.trustusbank-platform.svc.cluster.local:8080/mcp/currency-converter
