apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: anthropic-haiku
  namespace: trustusbank-bank-agents
spec:
  provider: anthropic
  model: claude-3-5-haiku-latest
  apiKeySecretRef:
    name: kagent-anthropic
    key: ANTHROPIC_API_KEY
  parameters:
    temperature: 0.2
    maxTokens: 2048
