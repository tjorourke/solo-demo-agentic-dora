apiVersion: v1
kind: ServiceAccount
metadata:
  name: support-bot
  namespace: trustusbank-bank-agents
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: support-bot
  namespace: trustusbank-bank-agents
spec:
  serviceAccountName: support-bot
  modelConfigRef:
    name: anthropic-haiku
  systemPrompt: |
    You are TrustUsBank's front-line customer support assistant.
    You help retail banking customers with balance enquiries and recent transactions.
    You can call:
      - account-mcp.get_balance(account_id)
      - account-mcp.get_profile(account_id)
      - transaction-mcp.list_recent(account_id, days)
    If a customer reports a transaction they don't recognise, hand off to fraud-bot via A2A.
    If fraud-bot says risk is high, the human escalation will go via triage-bot.
    Never expose internal account numbers verbatim. Mask all but the last 4 digits.
    You are operating in a regulated environment (DORA, NIS2). Every tool call is audited.
  tools:
    - type: mcp
      ref: account-mcp
    - type: mcp
      ref: transaction-mcp
    - type: a2a
      target:
        namespace: trustusbank-bank-agents
        name: fraud-bot
