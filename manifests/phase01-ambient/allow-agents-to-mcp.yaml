apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-agents-to-mcp
  namespace: trustusbank-bank-mcp
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/trustusbank-bank-agents/sa/support-bot"
              - "cluster.local/ns/trustusbank-bank-agents/sa/fraud-bot"
              - "cluster.local/ns/trustusbank-bank-agents/sa/triage-bot"
              - "cluster.local/ns/trustusbank-platform/sa/agentgateway"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-platform-to-agents
  namespace: trustusbank-bank-agents
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/trustusbank-platform/sa/agentgateway"
              # kagent-controller is the actual SA on the kagent runtime
              # pod (NOT 'kagent') — it's what proxies A2A calls into the
              # agent pods. Without this, A2A returns 503 upstream connect
              # error from kagent-controller→support-bot/fraud-bot/etc.
              - "cluster.local/ns/trustusbank-platform/sa/kagent-controller"
              - "cluster.local/ns/trustusbank-platform/sa/kagent-ui"
              - "cluster.local/ns/trustusbank-bank-frontend/sa/chatbot"
              # In Ambient with waypoints, pod-to-pod traffic transits
              # the destination namespace's waypoint. From ztunnel's view
              # on the inbound side, the SOURCE is the waypoint — not
              # the original caller. So the L4 allow needs the waypoint
              # SA too (the waypoint then enforces L7 / original-source
              # rules separately).
              - "cluster.local/ns/trustusbank-bank-agents/sa/waypoint"
