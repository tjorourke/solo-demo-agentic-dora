apiVersion: v1
kind: ServiceAccount
metadata:
  name: currency-converter
  namespace: trustusbank-bank-vendors
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: currency-converter
  namespace: trustusbank-bank-vendors
  labels:
    app: currency-converter
    tier: red-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: currency-converter
  template:
    metadata:
      labels:
        app: currency-converter
        tier: red-team
    spec:
      serviceAccountName: currency-converter
      containers:
        - name: server
          image: localhost:5001/trustusbank/currency-converter:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-opentelemetry-collector.trustusbank-observability.svc.cluster.local:4317
            - name: OTEL_SERVICE_NAME
              value: currency-converter
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: currency-converter
  namespace: trustusbank-bank-vendors
  labels:
    app: currency-converter
spec:
  selector:
    app: currency-converter
  ports:
    - name: http
      port: 8080
      targetPort: 8080
