apiVersion: v1
kind: ServiceAccount
metadata:
  name: transaction-mcp
  namespace: trustusbank-bank-mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-mcp
  namespace: trustusbank-bank-mcp
  labels:
    app: transaction-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-mcp
  template:
    metadata:
      labels:
        app: transaction-mcp
    spec:
      serviceAccountName: transaction-mcp
      containers:
        - name: server
          image: localhost:5001/trustusbank/transaction-mcp:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-opentelemetry-collector.trustusbank-observability.svc.cluster.local:4317
            - name: OTEL_SERVICE_NAME
              value: transaction-mcp
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-mcp
  namespace: trustusbank-bank-mcp
spec:
  selector:
    app: transaction-mcp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
