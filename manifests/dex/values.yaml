# Dex static-user OIDC IdP for the kagent-enterprise demo.

replicaCount: 1

image:
  pullPolicy: IfNotPresent

config:
  issuer: http://host.docker.internal:5556
  storage:
    type: memory
  web:
    http: 0.0.0.0:5556
    allowedOrigins: ['*']
  oauth2:
    skipApprovalScreen: true
    alwaysShowLoginScreen: false
    # passwordConnector enables grant_type=password on the /token endpoint
    # so service workloads (e.g. the chatbot frontend on the edge cluster)
    # can fetch a JWT without an interactive login. The token represents
    # the staticPassword user named admin@kagent.local.
    passwordConnector: local
  enablePasswordDB: true
  staticPasswords:
    - email: admin@kagent.local
      hash: $2y$10$as1hoARJEojALjYpAxQTqeg.LKYndQ1lc7wLqoesMOwbvlifcU.mi
      username: admin
      userID: kagent-admin-id
  staticClients:
    - id: kagent-enterprise
      name: kagent-enterprise
      secret: 19885cfdd79015377150d560dfdf71d2
      redirectURIs:
        - http://localhost:18007/oauth2/callback
        - http://localhost:18007/api/auth/callback/oidc
      trustedPeers:
        - kagent-enterprise

service:
  type: ClusterIP
  ports:
    http:
      port: 5556

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
