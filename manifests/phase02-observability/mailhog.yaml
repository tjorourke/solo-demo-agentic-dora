# MailHog — sample SMTP server + web UI. Catches every email Alertmanager
# sends and surfaces it in a browser tab.
#
#   SMTP listener:  mailhog.trustusbank-observability.svc.cluster.local:1025
#   Web UI:         mailhog.trustusbank-observability.svc.cluster.local:8025
#                   → port-forwarded to localhost:18012
#
# This is a demo-grade C2 stand-in for "the SOC's email inbox." When the
# IstioAuthZDeny / BankToAttackerAttempt alerts fire, the email lands in
# MailHog with the offending pod's SPIFFE identity, the dashboard link,
# and the deny details — so the audience watches the real notification
# flow Alertmanager → SMTP → SOC inbox in under a second.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: trustusbank-observability
  labels:
    app: mailhog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          ports:
            - { name: smtp, containerPort: 1025 }
            - { name: http, containerPort: 8025 }
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
          readinessProbe:
            tcpSocket: { port: smtp }
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: trustusbank-observability
  labels:
    app: mailhog
spec:
  selector:
    app: mailhog
  ports:
    - { name: smtp, port: 1025, targetPort: smtp }
    - { name: http, port: 8025, targetPort: http }
