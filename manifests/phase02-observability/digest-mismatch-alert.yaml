# Fires when digest-watcher detects an MCP tool-definition change since
# baseline. This is the rug-pull canary — DORA Art. 10 detection.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: digest-mismatch-rules
  namespace: trustusbank-observability
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: trustusbank.rugpull
      interval: 30s
      rules:
        - alert: MCPToolDigestMismatch
          expr: increase(agentregistry_digest_mismatch_total[5m]) > 0
          for: 0m
          labels:
            severity: critical
            dora_article: "10"
            nis2_clause: "21(2)(b)"
          annotations:
            summary: "Rug-pull detected on {{ $labels.mcp_server }}"
            description: |
              digest-watcher observed a SHA-256 mismatch in the tool definitions
              served by {{ $labels.mcp_server }} since the baseline was established.
              This is the canary for an MCP tool rug-pull or compromised image push.
              See ConfigMap trustusbank-platform/digest-mismatches for the diff,
              and the access log in agentgateway for blocked tool calls.
            runbook: "demo-scripts/runbook.md#vector-2-rug-pull"

        - alert: DigestWatcherStale
          expr: time() - max by (mcp_server) (agentregistry_last_check_timestamp_seconds) > 300
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "digest-watcher hasn't checked {{ $labels.mcp_server }} in >5min"
            description: |
              The rug-pull canary is silent. Either the watcher pod is unhealthy
              or the AuthorizationPolicy is blocking it.
