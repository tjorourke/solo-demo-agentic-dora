mode: daemonset
image:
  repository: otel/opentelemetry-collector-contrib

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch: {}
    resource:
      attributes:
        - key: deployment.environment
          value: "trustusbank-demo"
          action: upsert
  exporters:
    otlp/tempo:
      endpoint: tempo.trustusbank-observability.svc.cluster.local:4317
      tls:
        insecure: true
    loki:
      endpoint: http://loki.trustusbank-observability.svc.cluster.local:3100/loki/api/v1/push
    prometheus:
      endpoint: 0.0.0.0:8889
  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [otlp/tempo]
      logs:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [loki]
      metrics:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [prometheus]

ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  metrics:
    enabled: true
