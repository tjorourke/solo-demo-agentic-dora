mode: daemonset
image:
  repository: otel/opentelemetry-collector-contrib

config:
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch: {}
    resource:
      attributes:
        - key: deployment.environment
          value: "trustusbank-demo"
          action: upsert
  exporters:
    otlp/tempo:
      endpoint: tempo.trustusbank-observability.svc.cluster.local:4317
      tls:
        insecure: true
    # Loki ingests OTLP natively at /otlp/v1/logs — the dedicated `loki`
    # exporter was removed from contrib. Use otlphttp pointed at Loki.
    otlphttp/loki:
      endpoint: http://loki.trustusbank-observability.svc.cluster.local:3100/otlp
    debug:
      verbosity: basic
  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [otlp/tempo]
      logs:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [otlphttp/loki]
      metrics:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [debug]

ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  metrics:
    enabled: true
