grafana:
  enabled: true
  adminPassword: "trustusbank-demo"
  service:
    type: ClusterIP
  defaultDashboardsEnabled: true
  resources:
    requests: { memory: 128Mi, cpu: 50m }
    limits:   { memory: 256Mi }
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
  additionalDataSources:
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.trustusbank-observability.svc.cluster.local:3200
      access: proxy
      jsonData:
        nodeGraph: { enabled: true }
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.trustusbank-observability.svc.cluster.local:3100
      access: proxy

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # Demo retention — was 30d, which is wasteful on a laptop kind cluster.
    retention: 6h
    retentionSize: 512MB
    resources:
      requests: { memory: 256Mi, cpu: 100m }
      limits:   { memory: 512Mi }

prometheusOperator:
  resources:
    requests: { memory: 64Mi, cpu: 25m }
    limits:   { memory: 128Mi }

# Disable alerting in dev — saves ~150 MB.
alertmanager:
  enabled: false

# Node-level metrics aren't useful for the agentic demo. Disable to save ~150 MB.
prometheus-node-exporter:
  enabled: false
kube-state-metrics:
  enabled: false
