# Tool allowlist enforced at agentgateway. CEL expressions match on
# mcp.tool.name to bound which tools each route exposes, plus the MCP
# lifecycle methods (initialize, tools/list, tools/call, notifications,
# session DELETE) so the wire protocol works end-to-end.

apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: account-mcp-allowlist
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: account-mcp-route
  traffic:
    authorization:
      action: Allow
      policy:
        matchExpressions:
          # MCP wire protocol lifecycle
          - 'mcp.method == "initialize"'
          - 'mcp.method == "tools/list"'
          - 'mcp.method == "tools/call"'
          - 'mcp.method == "notifications/initialized"'
          - 'mcp.method == "notifications/cancelled"'
          # Per-tool allow
          - 'mcp.tool.name == "get_balance"'
          - 'mcp.tool.name == "get_profile"'
---
