# spec.traffic policies must target Gateway / ListenerSet / GRPCRoute / HTTPRoute.
# We attach one allowlist policy per HTTPRoute.

apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: account-mcp-allowlist
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: account-mcp-route
  traffic:
    authorization:
      action: Allow
      policy:
        matchExpressions:
          - 'jwt.sub == "service-account-support-bot" && (mcp.tool.name == "get_balance" || mcp.tool.name == "get_profile")'
          - 'jwt.sub == "service-account-fraud-bot" && mcp.tool.name == "get_profile"'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: transaction-mcp-allowlist
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: transaction-mcp-route
  traffic:
    authorization:
      action: Allow
      policy:
        matchExpressions:
          - 'jwt.sub == "service-account-support-bot" && mcp.tool.name == "list_recent"'
          - 'jwt.sub == "service-account-fraud-bot" && (mcp.tool.name == "list_recent" || mcp.tool.name == "get_details" || mcp.tool.name == "flag_suspicious")'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ticket-mcp-allowlist
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ticket-mcp-route
  traffic:
    authorization:
      action: Allow
      policy:
        matchExpressions:
          - 'jwt.sub == "service-account-triage-bot" && (mcp.tool.name == "create_ticket" || mcp.tool.name == "notify_human")'
