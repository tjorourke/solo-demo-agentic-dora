# Tool allowlists are encoded inside AgentgatewayPolicy.spec.backend.mcp.authorization
# using CEL expressions (jwt.* and mcp.* variables). Unauthorized tools are
# filtered from list_tools responses, and tools/call requests are denied.

apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: account-mcp-allowlist
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: account-mcp
  backend:
    mcp:
      authorization:
        action: Allow
        policy:
          matchExpressions:
            # support-bot can read balance + profile
            - 'jwt.sub == "service-account-support-bot" && (mcp.tool.name == "get_balance" || mcp.tool.name == "get_profile")'
            # fraud-bot can read profile only
            - 'jwt.sub == "service-account-fraud-bot" && mcp.tool.name == "get_profile"'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: transaction-mcp-allowlist
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: transaction-mcp
  backend:
    mcp:
      authorization:
        action: Allow
        policy:
          matchExpressions:
            # support-bot can list, but NOT flag_suspicious or get_details
            - 'jwt.sub == "service-account-support-bot" && mcp.tool.name == "list_recent"'
            # fraud-bot has full read + the flag tool
            - 'jwt.sub == "service-account-fraud-bot" && (mcp.tool.name == "list_recent" || mcp.tool.name == "get_details" || mcp.tool.name == "flag_suspicious")'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ticket-mcp-allowlist
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: ticket-mcp
  backend:
    mcp:
      authorization:
        action: Allow
        policy:
          matchExpressions:
            # only triage-bot can open tickets / notify humans
            - 'jwt.sub == "service-account-triage-bot" && (mcp.tool.name == "create_ticket" || mcp.tool.name == "notify_human")'
