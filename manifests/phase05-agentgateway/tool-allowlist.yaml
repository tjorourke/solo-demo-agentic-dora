# Tool allowlist enforced at agentgateway. CEL expressions match on
# mcp.tool.name to bound which tools each route exposes.
#
# In production you'd combine this with jwt.sub for per-agent identity.
# For this demo we keep it simple: each route only exposes the tools that
# legitimate agents would invoke. Anything else gets a 403 at the gateway.

apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: account-mcp-allowlist
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: account-mcp-route
  traffic:
    authorization:
      action: Allow
      policy:
        matchExpressions:
          - 'mcp.tool.name == "get_balance"'
          - 'mcp.tool.name == "get_profile"'
          - 'mcp.method == "tools/list"'
          - 'mcp.method == "initialize"'
          - 'mcp.method == "notifications/initialized"'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: transaction-mcp-allowlist
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: transaction-mcp-route
  traffic:
    authorization:
      action: Allow
      policy:
        matchExpressions:
          - 'mcp.tool.name == "list_recent"'
          - 'mcp.tool.name == "get_details"'
          - 'mcp.tool.name == "flag_suspicious"'
          - 'mcp.method == "tools/list"'
          - 'mcp.method == "initialize"'
          - 'mcp.method == "notifications/initialized"'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ticket-mcp-allowlist
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ticket-mcp-route
  traffic:
    authorization:
      action: Allow
      policy:
        matchExpressions:
          - 'mcp.tool.name == "create_ticket"'
          - 'mcp.tool.name == "notify_human"'
          - 'mcp.method == "tools/list"'
          - 'mcp.method == "initialize"'
          - 'mcp.method == "notifications/initialized"'
