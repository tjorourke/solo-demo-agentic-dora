apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: account-mcp-route
  namespace: trustusbank-platform
spec:
  parentRefs:
    - name: trustusbank-agentgw
  rules:
    - matches:
        - path: { type: PathPrefix, value: /mcp/account }
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: account-mcp
---
