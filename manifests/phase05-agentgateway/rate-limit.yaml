apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: per-agent-rate-limit
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: trustusbank-agentgw
  traffic:
    rateLimit:
      local:
        tokens: 100
        fillInterval: 60s
        descriptors:
          - key: jwt.sub
