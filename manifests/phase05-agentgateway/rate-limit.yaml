apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: per-gateway-rate-limit
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: trustusbank-agentgw
  traffic:
    rateLimit:
      local:
        - requests: 100
          unit: Minutes
          burst: 20
