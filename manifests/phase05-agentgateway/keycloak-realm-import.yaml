apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-trustusbank-realm
  namespace: trustusbank-platform
data:
  trustusbank-realm.json: |
    {
      "realm": "trustusbank",
      "enabled": true,
      "clients": [
        {
          "clientId": "support-bot",
          "enabled": true,
          "serviceAccountsEnabled": true,
          "directAccessGrantsEnabled": true,
          "publicClient": false,
          "secret": "support-bot-secret-CHANGEME",
          "attributes": {
            "access.token.signed.response.alg": "RS256"
          }
        },
        {
          "clientId": "fraud-bot",
          "enabled": true,
          "serviceAccountsEnabled": true,
          "directAccessGrantsEnabled": true,
          "publicClient": false,
          "secret": "fraud-bot-secret-CHANGEME"
        },
        {
          "clientId": "triage-bot",
          "enabled": true,
          "serviceAccountsEnabled": true,
          "directAccessGrantsEnabled": true,
          "publicClient": false,
          "secret": "triage-bot-secret-CHANGEME"
        }
      ]
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-realm-import
  namespace: trustusbank-platform
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: import
          image: bitnami/keycloak:26
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Wait for Keycloak admin endpoint
              until curl -fsS "http://keycloak.trustusbank-platform.svc.cluster.local/realms/master" >/dev/null; do
                echo "waiting for keycloak..."; sleep 5
              done
              # Get admin token
              TOKEN=$(curl -fsS -X POST "http://keycloak.trustusbank-platform.svc.cluster.local/realms/master/protocol/openid-connect/token" \
                -d "client_id=admin-cli" \
                -d "username=admin" \
                -d "password=${KEYCLOAK_ADMIN_PASSWORD}" \
                -d "grant_type=password" | jq -r .access_token)
              # Create realm if not exists
              if ! curl -fsS -H "Authorization: Bearer $TOKEN" "http://keycloak.trustusbank-platform.svc.cluster.local/admin/realms/trustusbank" >/dev/null 2>&1; then
                curl -fsS -X POST -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
                  "http://keycloak.trustusbank-platform.svc.cluster.local/admin/realms" \
                  --data @/realm/trustusbank-realm.json
                echo "realm created"
              else
                echo "realm exists; skipping"
              fi
          env:
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: admin-password
          volumeMounts:
            - name: realm
              mountPath: /realm
      volumes:
        - name: realm
          configMap:
            name: keycloak-trustusbank-realm
