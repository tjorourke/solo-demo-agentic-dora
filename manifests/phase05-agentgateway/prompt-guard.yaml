# Note: agentgateway's promptGuard only applies to AI workloads
# (spec.backend.ai.promptGuard, for direct LLM proxy traffic). MCP tool
# traffic is governed by the authorization policy and by the
# digest-watcher service (which is what actually catches a poisoned tool
# description — the description change makes the digest differ from baseline).
#
# This file is kept as a placeholder so the demo's prompt-injection story
# remains explicit in source: the threat model + the matching control.

apiVersion: v1
kind: ConfigMap
metadata:
  name: prompt-injection-controls
  namespace: trustusbank-platform
data:
  README.md: |
    Threat: a malicious MCP server embeds prompt-injection payload in a
    tool description. The agent's LLM would otherwise read it as
    instructions.

    Controls in this demo:
      1. digest-watcher (services/digest-watcher) computes SHA-256 over
         every MCP server's tool definitions every 30s. A poisoned
         description changes the digest from baseline. The mismatch is
         recorded in ConfigMap digest-mismatches and fires the
         MCPToolDigestMismatch Prometheus alert.
      2. agentregistry signing policy (cosign) blocks unsigned artefacts
         at registration, so an attacker cannot register an evil MCP
         server unless an operator force-allows it (the demo's
         "gotcha" — Phase 3.10).
      3. agentgateway tool-allowlist (CEL on jwt.sub + mcp.tool.name)
         scopes which tools each agent identity may call regardless of
         what the registry contains.
