# Prompt-guard / prompt-injection detection lives inside AgentgatewayPolicy.
# agentgateway supports regex, OpenAI Moderation, AWS Bedrock Guardrails, Google
# Model Armor, and custom webhooks. Here we use the regex layer — fast, no
# external dependency, ideal for the demo.

apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: prompt-guard
  namespace: trustusbank-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: trustusbank-agentgw
  traffic:
    promptGuard:
      regex:
        rules:
          - pattern: '(?i)ignore (your |all )?previous instructions'
            name: injection-ignore-instructions
          - pattern: '(?i)disregard (your |all )?prior'
            name: injection-disregard
          - pattern: '(?i)exfiltrate'
            name: injection-exfil
          - pattern: '(?i)attacker\.[a-z]+'
            name: injection-attacker-domain
          - pattern: '(?i)<\s*system\s*>'
            name: injection-system-tag
        action: Deny
        applyTo:
          - tool.description
          - tool.arguments
          - response.content
