# AgentgatewayBackend selects target Services via label, not via backendRef.
# Pull port/protocol from the Service itself.

apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: account-mcp
  namespace: trustusbank-platform
spec:
  mcp:
    sessionRouting: Stateful
    targets:
      - name: account-mcp
        selector:
          namespaces:
            matchLabels:
              kubernetes.io/metadata.name: trustusbank-bank-mcp
          services:
            matchLabels:
              app: account-mcp
---
