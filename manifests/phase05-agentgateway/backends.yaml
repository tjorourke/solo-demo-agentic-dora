# AgentgatewayBackend with static.host + port + protocol set explicitly.
# Stay in trustusbank-platform namespace so HTTPRoute → Backend stays
# same-namespace (avoids ReferenceGrant). Use cluster-DNS host for the
# cross-ns service.

apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: account-mcp
  namespace: trustusbank-platform
spec:
  mcp:
    sessionRouting: Stateful
    targets:
      - name: account-mcp
        static:
          host: account-mcp.trustusbank-bank-mcp.svc.cluster.local
          port: 8080
          path: /mcp
          protocol: StreamableHTTP
---
