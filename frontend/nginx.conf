server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # CORS for local-dev — frontend (port-forwarded :18009) talks to kagent (:18007)
  location / {
    add_header Cache-Control "no-store" always;
    try_files $uri /index.html;
  }

  # Proxy A2A calls so the browser doesn't hit CORS at all
  resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;
  location /api/ {
    set $kagent http://kagent-ui.trustusbank-platform.svc.cluster.local:8080;
    proxy_pass $kagent$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_read_timeout 120s;
  }

  location /healthz { return 200 "ok"; default_type text/plain; }
}
