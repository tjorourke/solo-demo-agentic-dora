server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Required for dynamic upstreams (proxy_pass with a variable hostname).
  # nginx-stable doesn't read /etc/resolv.conf for non-static upstreams,
  # so point at the cluster DNS directly. kind clusters always have
  # CoreDNS at this name.
  resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

  # CORS for local-dev — frontend (port-forwarded :18009) talks to the
  # bank cluster's agents via the in-mesh service DNS below.
  location / {
    add_header Cache-Control "no-store" always;
    try_files $uri /index.html;
  }

  # Route /api/a2a/<ns>/<agent>/ DIRECTLY to the matching agent's A2A
  # JSON-RPC endpoint on port 8080. The chatbot UI already speaks A2A
  # natively (POST with jsonrpc:"2.0" message/send), so we don't need
  # to round-trip through the kagent controller's REST API. Going direct
  # has two benefits:
  #
  # 1. No need for OIDC auth — the kagent controller's REST API requires
  #    a session cookie from oauth2-proxy, but the agent's A2A port has
  #    no application-layer auth. Mesh-level AuthZ (Istio + the
  #    kagent AccessPolicy translated to EnterpriseAgentgatewayPolicy)
  #    enforces *who can invoke this agent* at the waypoint, based on
  #    the calling pod's SPIFFE identity (this nginx pod's ServiceAccount).
  #
  # 2. Cross-cluster works for free. The bank cluster's
  #    trustusbank-bank-agents namespace is labelled
  #    solo.io/service-scope=global, so this service DNS resolves
  #    transparently from edge.
  #
  # The AccessPolicy that allows this chatbot to invoke support-bot
  # lives in manifests/phase06-kagent-accesspolicy/. If you scale that
  # AccessPolicy back to triage-bot only, this endpoint will start
  # returning 403 — that's the rug-pull defence demo.
  location ~ ^/api/a2a/([^/]+)/([^/]+)/(.*)$ {
    set $agent_ns  $1;
    set $agent     $2;
    set $rest      $3;
    # NB: $rest may be empty (e.g. POST to .../support-bot/ for message/send).
    # The trailing slash on proxy_pass keeps that working.
    proxy_pass http://$agent.$agent_ns.svc.cluster.local:8080/$rest;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_read_timeout 120s;
    # SSE / streaming responses
    chunked_transfer_encoding on;
  }

  location /healthz { return 200 "ok"; default_type text/plain; }
}
